services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'password'
      POSTGRES_DB: 'parkinsontap'
    ports:
      - "5433:5432"
    expose:
      - '5432'
    volumes:
      - parkinsontap-data:/var/lib/postgresql/data:rw

volumes:
  parkinsontap-data:
