version: '3.1'

services:
  db:
    image: postgres:15
    container_name: parkinsontap-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: parkinsontap
    ports:
      - "5432:5432"
    volumes:
      - parkinsontap-data:/var/lib/postgresql/data:rw

volumes:
  parkinsontap-data:
